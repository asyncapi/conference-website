[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "16.13.2"
  NPM_VERSION = "8.1.2"

[functions]
  directory = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    Content-Security-Policy = "frame-ancestors 'self'"

[[plugins]]
  package = "@netlify/plugin-nextjs"
